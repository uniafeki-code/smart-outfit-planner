  function getFamily(form) {
    if (form.occasion === "Work" && form.environment === "Office") return "polishedWork";
    if (form.occasion === "Work") return "cityWork";
    if (form.occasion === "Casual Day" && form.environment === "Home") return "relaxedHome";
    if (form.occasion === "Casual Day" && form.environment === "Outdoor") return "outdoorEasy";
    if (form.occasion === "Casual Day") return "everydayCity";
    if (form.occasion === "Coffee Meeting") return "coffeePolished";
    if (form.occasion === "Date Night" && ["Romantic", "Feminine", "Elegant"].includes(form.mood)) return "dateRomantic";
    if (form.occasion === "Date Night") return "dateConfident";
    if (form.occasion === "Dinner") return "dinnerElegant";
    if (form.occasion === "Travel Day") return "travelSmart";
    if (form.occasion === "Family Event") return "familySoft";
    if (form.occasion === "Special Occasion") return "specialDressy";
    return "weekendRelaxed";
  }

  function filterForTemperature(top, shoes, outerwear, form, baseIndex) {
    let nextTop = top;
    let nextShoes = shoes;
    let nextOuterwear = outerwear;

    if (form.temperature === "Hot") {
      nextTop = choose([
        "light scoop-neck knit top",
        "soft draped blouse",
        "easy cotton crewneck tee",
        "sleek sleeveless shell top"
      ], baseIndex);

      if (["warm wool coat", "puffer coat", "heavy winter coat", "elegant coat"].includes(nextOuterwear)) {
        nextOuterwear = "no outerwear needed";
      }

      if (["ankle boots", "dressy ankle boots", "tall boots", "winter-ready boots"].includes(nextShoes)) {
        nextShoes = choose(["white sneakers", "soft loafers", "comfort flats", "dress flats"], baseIndex);
      }
    }

    if (["Freezing", "Cold", "Cool"].includes(form.temperature)) {
      if (["flat sandals", "elegant heeled sandals"].includes(nextShoes)) nextShoes = "ankle boots";
      if (form.temperature === "Freezing") {
        nextOuterwear = choose(["warm wool coat", "puffer coat", "heavy winter coat"], baseIndex);
      }
    }

    return { top: nextTop, shoes: nextShoes, outerwear: nextOuterwear };
  }

  function applyWeatherRules(top, bottom, shoes, outerwear, form, baseIndex) {
    let nextTop = top;
    let nextBottom = bottom;
    let nextShoes = shoes;
    let nextOuterwear = outerwear;

    if (form.weather === "Rainy") {
      if (["flat sandals", "elegant heeled sandals"].includes(nextShoes)) nextShoes = "ankle boots";
      nextOuterwear = choose(["classic trench coat", "water-resistant jacket", "rain-ready layer"], baseIndex);
    }

    if (form.weather === "Snowy") {
      nextShoes = choose(["tall boots", "ankle boots", "winter-ready boots"], baseIndex);
      nextOuterwear = choose(["warm wool coat", "puffer coat", "heavy winter coat"], baseIndex);
    }

    if (form.weather === "Windy") {
      nextOuterwear = choose(["structured jacket", "light coat", "wind-ready trench", "zip-front jacket"], baseIndex);
    }

    if (form.weather === "Sunny" && form.temperature !== "Cold" && form.temperature !== "Freezing") {
      if (nextOuterwear === "trench coat" || nextOuterwear === "light coat") {
        nextOuterwear = choose(["no outerwear needed", "light cardigan", "soft blazer"], baseIndex);
      }
    }

    return { top: nextTop, bottom: nextBottom, shoes: nextShoes, outerwear: nextOuterwear };
  }

  function applyComfortRules(top, bottom, shoes, outerwear, form, baseIndex) {
    let nextTop = top;
    let nextBottom = bottom;
    let nextShoes = shoes;
    let nextOuterwear = outerwear;

    if (form.comfort === "Maximum Comfort") {
      nextShoes = choose(["comfort sneakers", "soft flats", "walking loafers", "easy slip-ons"], baseIndex);
      nextBottom = choose(["soft travel pants", "relaxed trousers", "straight jeans", "soft straight pants"], baseIndex);
    }

    if (form.comfort === "Style First") {
      nextShoes = choose(["pointed ballet flats", "ankle boots", "elegant heels", "pointed slingbacks"], baseIndex);
    }

    if (form.comfort === "Statement Look") {
      nextTop = choose([
        "statement blouse with a defined neckline",
        "bold structured top",
        "attention-grabbing knit",
        "dramatic sleeve blouse"
      ], baseIndex);
    }

    return { top: nextTop, bottom: nextBottom, shoes: nextShoes, outerwear: nextOuterwear };
  }

  function applyEffortRules(top, bottom, shoes, outerwear, form, baseIndex) {
    let nextTop = top;
    let nextBottom = bottom;
    let nextShoes = shoes;
    let nextOuterwear = outerwear;

    if (form.effort === "Quick & Easy") {
      nextOuterwear = choose(["easy cardigan", "light jacket", "no outerwear needed"], baseIndex);
    }

    if (form.effort === "Full Styled Look") {
      nextOuterwear = choose(["tailored blazer", "elegant coat", "styled layering piece", "refined longline jacket"], baseIndex);
      nextShoes = choose(["ankle boots", "pointed slingbacks", "low block heels", "elegant heels"], baseIndex);
    }

    return { top: nextTop, bottom: nextBottom, shoes: nextShoes, outerwear: nextOuterwear };
  }

  function applyEnvironmentRules(top, bottom, shoes, outerwear, form, baseIndex) {
    let nextTop = top;
    let nextBottom = bottom;
    let nextShoes = shoes;
    let nextOuterwear = outerwear;

    if (form.environment === "Home") {
      nextShoes = choose(["soft flats", "easy slip-ons", "comfort slides"], baseIndex);
      nextOuterwear = "no outerwear needed";
    }

    if (form.environment === "Travel") {
      nextBottom = choose(["stretch trousers", "travel-friendly pants", "relaxed jeans", "pull-on ankle pants"], baseIndex);
      nextShoes = choose(["comfort sneakers", "walking loafers", "soft ballet flats"], baseIndex);
    }

    if (form.environment === "Office" && form.occasion === "Work") {
      nextShoes = choose(["classic loafers", "low block heels", "pointed ballet flats", "ankle boots"], baseIndex);
      if (nextTop.includes("tee")) {
        nextTop = choose(["structured button-up shirt", "clean collared blouse", "sharp V-neck knit top"], baseIndex);
      }
    }

    return { top: nextTop, bottom: nextBottom, shoes: nextShoes, outerwear: nextOuterwear };
  }

  function applySurprise(top, bottom, shoes, outerwear, form, family, baseIndex, generation) {
    let nextTop = top;
    let nextBottom = bottom;
    let nextShoes = shoes;

    const surpriseTopByMood = {
      Cozy: "contrast-trim cardigan top",
      Confident: "sleek square-neck fitted top",
      Feminine: "soft wrap blouse with a gentle V-neck",
      Powerful: "strong-shoulder blouse",

      Romantic: "gentle sweetheart-neck blouse",
      Minimalist: "sleek sleeveless shell top",
      Playful: "color-pop knit top"
    };

    const surpriseBottomByFamily = {
      polishedWork: "wide-leg trousers",
      cityWork: "polished midi skirt",
      relaxedHome: "soft midi skirt",
      everydayCity: "soft midi skirt",
      coffeePolished: "easy A-line skirt",
      dateRomantic: "slip midi skirt",
      dateConfident: "tailored trousers",
      dinnerElegant: "satin midi skirt",
      travelSmart: "pull-on ankle pants",
      familySoft: "simple midi skirt",
      specialDressy: "sleek column skirt",
      weekendRelaxed: "soft wide-leg pants",
      outdoorEasy: "cropped casual pants"
    };

    const surpriseShoesByFamily = {
      polishedWork: "pointed ballet flats",
      cityWork: "low block heels",
      relaxedHome: "soft flats",
      everydayCity: "soft loafers",
      coffeePolished: "ballet flats",
      dateRomantic: "pointed slingbacks",
      dateConfident: "elegant heels",
      dinnerElegant: "pointed slingbacks",
      travelSmart: "walking loafers",
      familySoft: "easy loafers",
      specialDressy: "dressy ankle boots",
      weekendRelaxed: "casual boots",
      outdoorEasy: "clean ankle boots"
    };

    const mode = generation % 3;

    if (mode === 0) {
      nextTop = surpriseTopByMood[form.mood] || nextTop;
    } else if (mode === 1) {
      nextBottom = surpriseBottomByFamily[family] || nextBottom;
    } else {
      nextShoes = surpriseShoesByFamily[family] || nextShoes;
    }

    if (form.weather === "Rainy" && ["elegant heels", "flat sandals", "elegant heeled sandals"].includes(nextShoes)) {
      nextShoes = "ankle boots";
    }
    if (form.weather === "Snowy" && ["pointed slingbacks", "elegant heels", "flat sandals"].includes(nextShoes)) {
      nextShoes = "ankle boots";
    }
    if (form.environment === "Home") {
      nextShoes = "soft flats";
    }

    return { top: nextTop, bottom: nextBottom, shoes: nextShoes, outerwear };
  }

  function buildWhy(form, surprise) {
    const weatherText = {
      Sunny: "the brighter weather",
      Cloudy: "the softer weather",
      Rainy: "the rainy conditions",
      Windy: "the windy conditions",
      Snowy: "the cold snowy weather",
      Stormy: "the stormy forecast",
      "Mixed Weather": "the mixed conditions"
    }[form.weather];

    let sentence1 = `This works because ${weatherText}, your ${form.occasion.toLowerCase()} plans, and your ${form.mood.toLowerCase()} mood all point toward a look that feels realistic and wearable.`;

    let sentence2 = "";
    if (form.comfort === "Maximum Comfort") {
      sentence2 = "Comfort stays high here, so the outfit leans into softer and easier pieces without feeling careless.";
    } else if (form.comfort === "Style First" || form.comfort === "Statement Look") {
      sentence2 = "The styling direction makes the look feel more polished and noticeable while still staying practical.";
    } else if (form.effort === "Quick & Easy") {
      sentence2 = "It also stays simple enough for a lower-effort day.";
    } else if (form.effort === "Full Styled Look") {
      sentence2 = "It also gives you a more complete and intentionally styled result.";
    } else {
      sentence2 = "The balance between style and comfort keeps it easy to wear in real life.";
    }

    if (surprise) {
      sentence2 = "Surprise Me adds a tasteful twist, so the outfit feels fresher without becoming random or overdone.";
    }

    return `${sentence1} ${sentence2}`;
  }

  function buildNote(form, surprise) {
    if (surprise) return "This version feels slightly fresher and more styled, but still easy to wear.";
    if (form.occasion === "Work") return "This look keeps you polished without feeling overdressed.";
    if (form.occasion === "Date Night" || form.occasion === "Dinner") return "This outfit feels put together and flattering without trying too hard.";
    if (form.environment === "Travel") return "This look is practical enough for movement, but still feels pulled together.";
    if (form.comfort === "Maximum Comfort") return "This outfit stays grounded in comfort while still feeling intentional.";
    return "This look stays grounded in real-life pieces most women already own or can easily build around.";
  }

  function generateOutfit(form, generation = 0, surprise = false) {
    const family = getFamily(form);
    const pool = families[family];

    const baseIndex =
      weatherOptions.indexOf(form.weather) +
      temperatureOptions.indexOf(form.temperature) +
      occasionOptions.indexOf(form.occasion) +
      moodOptions.indexOf(form.mood) +
      comfortOptions.indexOf(form.comfort) +
      effortOptions.indexOf(form.effort) +
      environmentOptions.indexOf(form.environment) +
      generation;

    let top = choose(pool.tops, baseIndex);
    let bottom = choose(pool.bottoms, baseIndex, 1);
    let shoes = choose(pool.shoes, baseIndex, 2);
    let outerwear = choose(pool.outerwear, baseIndex, 3);
    let stylingAdjustment = choose(temperatureAdjustments[form.temperature], baseIndex);

    ({ top, shoes, outerwear } = filterForTemperature(top, shoes, outerwear, form, baseIndex));
    ({ top, bottom, shoes, outerwear } = applyWeatherRules(top, bottom, shoes, outerwear, form, baseIndex));
    ({ top, bottom, shoes, outerwear } = applyComfortRules(top, bottom, shoes, outerwear, form, baseIndex));
    ({ top, bottom, shoes, outerwear } = applyEffortRules(top, bottom, shoes, outerwear, form, baseIndex));
    ({ top, bottom, shoes, outerwear } = applyEnvironmentRules(top, bottom, shoes, outerwear, form, baseIndex));

    if (surprise) {
      ({ top, bottom, shoes, outerwear } = applySurprise(top, bottom, shoes, outerwear, form, family, baseIndex, generation));
    }

    const why = buildWhy(form, surprise);
    const note = buildNote(form, surprise);

    return { top, bottom, shoes, outerwear, stylingAdjustment, why, note };
  }

  function renderResult(data, name) {
    const cleanName = name && name.trim() ? name.trim() : "";
    document.getElementById("resultTitle").textContent = cleanName ? `${cleanName}'s Outfit` : "Today’s Outfit";
    document.getElementById("topResult").textContent = data.top;
    document.getElementById("bottomResult").textContent = data.bottom;
    document.getElementById("shoesResult").textContent = data.shoes;
    document.getElementById("outerwearResult").textContent = data.outerwear;
    document.getElementById("stylingResult").textContent = data.stylingAdjustment;
    document.getElementById("whyResult").textContent = cleanName ? `${cleanName}, ${data.why.charAt(0).toLowerCase() + data.why.slice(1)}` : data.why;
    document.getElementById("noteResult").textContent = cleanName ? `${cleanName}, ${data.note.charAt(0).toLowerCase() + data.note.slice(1)}` : data.note;
  }

  function updateAgainButton() {
    const againBtn = document.getElementById("againBtn");
    const remaining = Math.max(0, 3 - generateCount);
    againBtn.textContent = remaining > 0 ? `🔄 Generate Again (${remaining} left)` : "🔄 Generate Again";
    againBtn.classList.toggle("btn-disabled", remaining === 0);
  }

  function updateSurpriseVisual() {
    document.getElementById("surpriseBtn").classList.toggle("active", surpriseActive);
  }

  function openModal(id) {
    const modal = document.getElementById(id);
    modal.classList.add("show");
    modal.setAttribute("aria-hidden", "false");
  }

  function closeModal(id) {
    const modal = document.getElementById(id);
    modal.classList.remove("show");
    modal.setAttribute("aria-hidden", "true");
  }

  fillAll();
  renderResult(generateOutfit(currentForm(), 0, false), "");
  updateAgainButton();
  updateSurpriseVisual();

  document.getElementById("generateBtn").addEventListener("click", () => {
    surpriseActive = false;
    updateSurpriseVisual();
    const form = currentForm();
    renderResult(generateOutfit(form, generateCount, false), form.name);
  });

  document.getElementById("surpriseBtn").addEventListener("click", () => {
    surpriseActive = true;
    updateSurpriseVisual();
    const form = currentForm();
    renderResult(generateOutfit(form, generateCount + 1, true), form.name);
  });

  document.getElementById("againBtn").addEventListener("click", () => {
    if (generateCount >= 3) return;
    generateCount += 1;
    updateAgainButton();
    const form = currentForm();
    renderResult(generateOutfit(form, generateCount, surpriseActive), form.name);
  });

  document.getElementById("premiumBtn").addEventListener("click", () => openModal("premiumModal"));
  document.getElementById("privacyBtn").addEventListener("click", (e) => {
    e.preventDefault();
    openModal("privacyModal");
  });
  document.getElementById("termsBtn").addEventListener("click", (e) => {
    e.preventDefault();
    openModal("termsModal");
  });

  document.querySelectorAll("[data-close]").forEach(btn => {
    btn.addEventListener("click", () => closeModal(btn.getAttribute("data-close")));
  });

  document.querySelectorAll(".modal").forEach(modal => {
    modal.addEventListener("click", (e) => {
      if (e.target === modal) closeModal(modal.id);
    });
  });
</script>
