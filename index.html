function generate() {

  let outfit = generateBaseOutfit(form);

  currentOutfit = outfit;

  render(outfit, form);
}

function render(outfit, form) {
  const name = form.name ? form.name : "";

  document.getElementById("resultTitle").textContent =
    (name ? name + ", " : "") + pick(outfitNames);

  document.getElementById("topResult").textContent = outfit.top;
  document.getElementById("bottomResult").textContent = outfit.bottom;
  document.getElementById("shoesResult").textContent = outfit.shoes;
  document.getElementById("outerwearResult").textContent = outfit.outerwear;

  document.getElementById("whyResult").textContent =
    (name ? name + ", " : "") +
    `this outfit works because the ${outfit.top} sets the tone, the ${outfit.bottom} keeps the balance, and the ${outfit.shoes} match the ${form.weather.toLowerCase()} weather.`;
}

function refine(type) {
  if (!currentOutfit) return;

  const outfit = { ...currentOutfit };

  if (type === "softer") {
    outfit.top = pick([
      "soft wrap blouse",
      "satin blouse",
      "feminine square-neck top"
    ]);
  }

  if (type === "polished") {
    outfit.outerwear = pick([
      "tailored blazer",
      "structured coat",
      "sleek longline jacket"
    ]);
  }

  if (type === "comfortable") {
    outfit.shoes = pick([
      "comfortable sneakers",
      "soft ballet flats",
      "easy loafers"
    ]);
  }

  currentOutfit = outfit;
  render(outfit, formData());
}

// EVENTY
document.querySelectorAll("[data-refine]").forEach(btn => {
  btn.addEventListener("click", () => {
    refine(btn.dataset.refine);
  });
});
</script>
